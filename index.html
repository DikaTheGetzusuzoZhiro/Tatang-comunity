<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fyy Store | Premium Roblox Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #07030c;
            color: #e2e8f0; 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(168, 85, 247, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(217, 70, 239, 0.08), transparent 25%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-panel { 
            background: linear-gradient(145deg, rgba(20, 10, 35, 0.6) 0%, rgba(15, 5, 25, 0.4) 100%);
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(192, 132, 252, 0.15); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(192, 132, 252, 0.1);
        }

        .inner-glass {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(192, 132, 252, 0.08);
            box-shadow: inset 0 0 20px rgba(192, 132, 252, 0.02);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .text-animated-gradient {
            background: linear-gradient(270deg, #c084fc, #e879f9, #f472b6, #c084fc);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .social-btn {
            transition: all 0.4s ease;
        }

        .btn-tiktok:hover { 
            border-color: #ff0050; 
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.2); 
            transform: translateY(-3px); 
        }

        .feature-icon-wrapper {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(217, 70, 239, 0.05));
            border: 1px solid rgba(168, 85, 247, 0.2);
        }
    </style>
</head>
<body class="antialiased">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-fuchsia-600/20 rounded-full blur-[120px]"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <div class="glass-panel w-full max-w-[420px] rounded-[2rem] p-8 text-center">
            
            <div class="flex flex-col items-center mb-8">
                <div class="relative mb-6 floating">
                    <img src="https://static.wikia.nocookie.net/logopedia/images/d/d4/Roblox_2018_O_Icon_final_-_White.svg" class="w-16 h-16">
                </div>
                
                <h1 class="text-4xl font-extrabold mb-2 text-animated-gradient">
                    FYY STORE
                </h1>
                <p class="text-purple-300 text-xs uppercase mb-4">
                    Premium Roblox Service
                </p>
                <div class="w-12 h-1 bg-gradient-to-r from-purple-500 to-fuchsia-400 rounded-full"></div>
            </div>

            <div class="inner-glass rounded-2xl p-6 mb-8 text-left">
                <h2 class="text-base font-bold mb-4 text-white">
                    ⚡ All-in-One Services
                </h2>
                
                <ul class="space-y-3 text-gray-300 text-sm">
                    <li class="flex items-center">
                        <div class="feature-icon-wrapper w-8 h-8 rounded-lg flex items-center justify-center mr-3">
                            🎤
                        </div>
                        Verifikasi On Mic
                    </li>
                    <li class="flex items-center">
                        <div class="feature-icon-wrapper w-8 h-8 rounded-lg flex items-center justify-center mr-3">
                            🪪
                        </div>
                        Ubah Umur
                    </li>
                    <li class="flex items-center">
                        <div class="feature-icon-wrapper w-8 h-8 rounded-lg flex items-center justify-center mr-3">
                            🌍
                        </div>
                        Ganti Negara
                    </li>
                </ul>

                <div class="mt-5 pt-4 border-t border-purple-500/20 flex justify-between">
                    <span>Total Harga</span>
                    <span class="font-bold text-purple-400">
                        Rp 30.000
                    </span>
                </div>
            </div>

            <!-- ONLY TIKTOK LEFT -->
            <a href="https://www.tiktok.com/@fyychiee" target="_blank" class="social-btn btn-tiktok flex items-center justify-between bg-black/40 border border-purple-500/20 text-white p-4 rounded-xl">
                <div class="flex items-center">
                    <i class="fab fa-tiktok text-xl mr-4"></i>
                    <span>@fyychiee</span>
                </div>
                <i class="fas fa-chevron-right text-xs"></i>
            </a>

        </div>

        <footer class="mt-8 text-center text-xs text-purple-300/40">
            &copy; 2026 FYY STORE
        </footer>

    </div>

</body>
</html>
