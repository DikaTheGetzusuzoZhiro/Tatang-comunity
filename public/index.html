<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SnapTik Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h2>SnapTik</h2>
</div>

<div class="main">

    <h1>Download Video TikTok Tanpa Watermark</h1>

    <div class="tabs">
        <button class="active">Video</button>
        <button>Mp3</button>
        <button>Slideshow</button>
        <button>Story</button>
    </div>

    <div class="input-box">
        <input type="text" id="url" placeholder="Paste Link TikTok Disini..." />
        <button onclick="paste()">Paste</button>
    </div>

    <button class="download-btn" onclick="getVideo()">⬇ Download</button>

    <!-- LOADING -->
    <div id="loading" class="hidden">Loading...</div>

    <!-- PREVIEW -->
    <div id="preview"></div>

    <!-- RESULT -->
    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
